services:

  # ─── RabbitMQ ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: spaceship_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - "5672:5672"    # AMQP
      - "0.0.0.0:1883:1883"    # MQTT
      - "127.0.0.1:15672:15672"  # Management UI
      - "127.0.0.1:15675:15675"  # MQTT over WebSocket
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: spaceship_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spaceship}
      POSTGRES_USER: ${POSTGRES_USER:-spaceship}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spaceship}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spaceship}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FrankenPHP (Symfony) ─────────────────────────────────────────────────
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spaceship_php
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-change_me_in_production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-spaceship}:${POSTGRES_PASSWORD:-spaceship}@postgres:5432/${POSTGRES_DB:-spaceship}?serverVersion=16&charset=utf8
      RABBITMQ_DSN: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/${RABBITMQ_VHOST:-%2F}
      MESSENGER_TRANSPORT_DSN: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/%2F/messages
      SERVER_NAME: ":80"
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./app:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  rabbitmq_data:
  postgres_data:
