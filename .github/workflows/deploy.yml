  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /var/www/spaceship

            BEFORE_SHA=$(git rev-parse HEAD)
            git pull origin main --ff-only
            AFTER_SHA=$(git rev-parse HEAD)

            # Rebuild Docker image only when Dockerfile/Caddyfile/docker/ changed
            if git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" \
                 | grep -qE '^(Dockerfile|Caddyfile|docker/)'; then
              docker compose up --build -d --wait
            fi

            # Run inside container — VPS host has no PHP
            docker compose exec -T php composer install \
              --prefer-dist --no-dev --no-scripts \
              --no-interaction --optimize-autoloader

            docker compose exec -T php \
              php bin/console doctrine:migrations:migrate \
                --no-interaction --allow-no-migration

            docker compose exec -T php php bin/console cache:clear --no-warmup
            docker compose exec -T php php bin/console cache:warmup

            docker compose restart php
